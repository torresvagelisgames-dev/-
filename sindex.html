<!DOCTYPE html>
<html lang="el">
<head>
    <meta charset="UTF-8">
    <title>GradeParser</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-900 text-white p-4">
    <div class="max-w-md mx-auto">
        <textarea id="rawInput" rows="5" class="w-full bg-gray-800 p-4 rounded-xl text-white">Μαθηματικά 6,0</textarea>
        <!-- Αλλάζουμε το κουμπί για να είμαστε σίγουροι -->
        <button id="btn" class="w-full mt-4 bg-red-600 py-4 rounded-xl font-bold">ΜΕΤΑΜΟΡΦΩΣΗ ΤΩΡΑ</button>
        <div id="results" class="mt-6 space-y-2"></div>
    </div>

    <script>
        document.getElementById('btn').onclick = function() {
            const input = document.getElementById('rawInput').value;
            const container = document.getElementById('results');
            container.innerHTML = '';
            
            // Απλή ανίχνευση: βρίσκει οτιδήποτε έχει νούμερο
            const lines = input.split('\n');
            lines.forEach(line => {
                const match = line.match(/(\d+)/);
                if (match) {
                    const grade = match[0];
                    const title = line.replace(grade, '').trim();
                    container.innerHTML += `<div class="bg-gray-800 p-4 rounded-lg flex justify-between">${title} - ${grade}</div>`;
                } else {
                    alert('Δεν βρήκα νούμερο στη γραμμή: ' + line);
                }
            });
        };
    </script>
</body>
</html>
