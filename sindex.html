<!DOCTYPE html>
<html lang="el">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MyUniGrades</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>body { transition: background-color 0.3s ease; }</style>
</head>
<body class="bg-slate-900 text-slate-100 min-h-screen pb-12 font-sans">

    <header class="border-b border-white/5 bg-white/5 backdrop-blur sticky top-0 z-10 px-4 py-4">
        <div class="max-w-md mx-auto flex items-center justify-between">
            <div class="flex items-center gap-3">
                <div class="w-10 h-10 rounded-xl bg-indigo-600 flex items-center justify-center font-bold">U</div>
                <div>
                    <h1 class="text-base font-bold">UniverSIS</h1>
                    <p class="text-xs text-slate-400">Πίνακας Βαθμών</p>
                </div>
            </div>
            <button onclick="location.reload()" class="text-xs bg-black/20 px-3 py-1.5 rounded-lg">Clear</button>
        </div>
        <div class="max-w-md mx-auto px-4 mt-3 flex gap-2">
            <button onclick="changeTheme('bg-slate-900')" class="w-5 h-5 rounded-full bg-slate-900 border border-slate-700"></button>
            <button onclick="changeTheme('bg-zinc-900')" class="w-5 h-5 rounded-full bg-zinc-900 border border-zinc-700"></button>
            <button onclick="changeTheme('bg-neutral-900')" class="w-5 h-5 rounded-full bg-neutral-900 border border-neutral-700"></button>
        </div>
    </header>

    <main class="max-w-md mx-auto px-4 mt-6">
        <div id="inputSection" class="bg-white/5 border border-white/10 rounded-2xl p-4">
            <textarea id="rawInput" rows="5" class="w-full bg-black/20 border border-white/10 rounded-xl p-3 text-sm focus:outline-none" placeholder="Επικόλληση δεδομένων εδώ..."></textarea>
            <button onclick="processGrades()" class="w-full mt-3 bg-indigo-600 text-white font-bold py-3 rounded-xl">Μεταμόρφωση ✨</button>
        </div>

        <div id="filterSection" class="hidden bg-white/5 border border-white/10 rounded-2xl p-4 mt-4">
            <div class="grid grid-cols-2 gap-2">
                <button onclick="changeView('all')" class="bg-indigo-600 py-2 rounded-xl text-xs">Όλα</button>
                <button onclick="changeView('semester')" class="bg-black/20 py-2 rounded-xl text-xs">Εξάμηνο</button>
            </div>
        </div>

        <div id="gradesContainer" class="hidden mt-6 pb-8">
            <div id="dynamicGroups" class="space-y-6"></div>
        </div>
    </main>

    <script>
        let allCourses = [];
        let currentView = 'all';

        function changeTheme(color) { document.body.className = color + " text-slate-100 min-h-screen pb-12"; }

        function processGrades() {
            const input = document.getElementById('rawInput').value;
            const lines = input.split('\n');
            allCourses = [];
            let currentSemester = "Γενικά";

            lines.forEach(line => {
                const trimmed = line.trim();
                if (!trimmed) return;
                if (trimmed.startsWith("Εξάμηνο:")) { currentSemester = trimmed.replace("Εξάμηνο:", "").trim(); return; }

                const words = trimmed.split(/\s+/);
                let code = words.find(w => /^[A-ZΑ-Ω]{2}\d{3}/.test(w)) || "";
                let grade = words.find(w => /^\d{1,2}[.,]\d{1,2}$|^\d{1,2}$/.test(w.replace(',', '.'))) || "";
                
                if (code && grade) {
                    let title = trimmed.replace(code, '').replace(grade, '').replace('ΕΞ1', '').replace('ΕΞ2', '').replace('ΕΑΡ', '').replace('ΧΕΙΜ', '').trim();
                    allCourses.push({ code, title, grade: grade, numericGrade: parseFloat(grade.replace(',', '.')), semester: currentSemester });
                }
            });

            if (allCourses.length > 0) {
                document.getElementById('inputSection').classList.add('hidden');
                document.getElementById('filterSection').classList.remove('hidden');
                document.getElementById('gradesContainer').classList.remove('hidden');
                renderGrades();
            } else { alert('Δεν βρέθηκαν βαθμοί. Έλεγξε το φορμάτ.'); }
        }

        function renderGrades() {
            const container = document.getElementById('dynamicGroups');
            container.innerHTML = '';
            const groups = currentView === 'all' ? { 'Μαθήματα': allCourses } : allCourses.reduce((r, a) => { r[a.semester] = r[a.semester] || []; r[a.semester].push(a); return r; }, {});
            
            for (const key in groups) {
                container.innerHTML += `<h2 class="text-xs font-bold uppercase text-slate-500">${key}</h2>`;
                groups[key].forEach(c => {
                    container.innerHTML += `
                        <div class="bg-white/5 border border-white/10 rounded-2xl p-4 flex justify-between items-center">
                            <div><span class="text-[10px] text-slate-500">${c.code}</span><h3 class="text-sm">${c.title}</h3></div>
                            <div class="font-bold text-lg">${c.grade}</div>
                        </div>`;
                });
            }
        }
        function changeView(view) { currentView = view; renderGrades(); }
    </script>
</body>
</html>
