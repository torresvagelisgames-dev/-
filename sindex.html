<!DOCTYPE html>
<html lang="el">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>MyUniGrades - UniverSIS Style</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; -webkit-tap-highlight-color: transparent; transition: background-color 0.3s ease; }
    </style>
</head>
<body class="bg-slate-900 text-slate-100 min-h-screen pb-12">

    <header class="border-b border-white/5 bg-white/5 backdrop-blur sticky top-0 z-10 px-4 py-4 shadow-sm">
        <div class="max-w-md mx-auto flex items-center justify-between">
            <div class="flex items-center gap-3">
                <div class="w-10 h-10 rounded-xl bg-indigo-600 flex items-center justify-center font-bold text-lg text-white shadow-lg shadow-indigo-500/30">U</div>
                <div>
                    <h1 class="text-base font-bold tracking-tight">UniverSIS</h1>
                    <p class="text-xs text-slate-400 font-medium">Πίνακας Νέων Βαθμών</p>
                </div>
            </div>
            <button onclick="resetApp()" class="text-xs text-slate-500 bg-black/20 px-3 py-1.5 rounded-lg font-medium active:scale-95 transition-all">Clear</button>
        </div>

        <!-- Theme Picker -->
        <div class="max-w-md mx-auto px-4 mt-3 flex gap-2">
            <span class="text-[9px] font-bold uppercase text-slate-500 self-center">Theme:</span>
            <button onclick="changeTheme('bg-slate-900')" class="w-5 h-5 rounded-full bg-slate-900 border border-slate-700"></button>
            <button onclick="changeTheme('bg-zinc-900')" class="w-5 h-5 rounded-full bg-zinc-900 border border-zinc-700"></button>
            <button onclick="changeTheme('bg-neutral-900')" class="w-5 h-5 rounded-full bg-neutral-900 border border-neutral-700"></button>
            <button onclick="changeTheme('bg-stone-900')" class="w-5 h-5 rounded-full bg-stone-900 border border-stone-700"></button>
        </div>
    </header>

    <main class="max-w-md mx-auto px-4 mt-6 space-y-6">
        <div id="inputSection" class="bg-white/5 border border-white/10 rounded-2xl p-4 shadow-md">
            <h2 class="text-sm font-semibold text-slate-200 mb-2 flex items-center gap-2"><span>📥</span> Επικόλληση Δεδομένων</h2>
            <textarea id="rawInput" rows="5" class="w-full bg-black/20 border border-white/10 rounded-xl p-3 text-sm focus:outline-none focus:border-indigo-500 text-slate-200 placeholder-slate-600 transition-all" placeholder="Επικόλληση εδώ..."></textarea>
            <button onclick="processGrades()" class="w-full mt-3 bg-indigo-600 hover:bg-indigo-500 text-white font-semibold text-sm py-3.5 px-4 rounded-xl shadow-lg shadow-indigo-600/20 active:scale-[0.98] transition-all">Μεταμόρφωση Βαθμών ✨</button>
        </div>

        <div id="filterSection" class="bg-white/5 border border-white/10 rounded-2xl p-4 hidden space-y-3">
            <label class="text-[10px] font-bold uppercase tracking-wider text-slate-400 block mb-1">Προβολή ανά:</label>
            <div class="grid grid-cols-3 gap-2">
                <button onclick="changeView('all')" id="btn-all" class="view-btn bg-indigo-600 text-white text-xs font-semibold py-2.5 px-2 rounded-xl transition-all shadow-md">Όλα</button>
                <button onclick="changeView('semester')" id="btn-semester" class="view-btn bg-black/20 text-slate-300 text-xs font-semibold py-2.5 px-2 rounded-xl transition-all">Εξάμηνο</button>
                <button onclick="changeView('period')" id="btn-period" class="view-btn bg-black/20 text-slate-300 text-xs font-semibold py-2.5 px-2 rounded-xl transition-all">Εξετ.</button>
            </div>
        </div>

        <div id="gradesContainer" class="hidden pb-8">
            <div id="dynamicGroups" class="space-y-6"></div>
        </div>
    </main>

    <script>
        let allCourses = [];
        let currentView = 'all';

        function changeTheme(colorClass) {
            document.body.className = colorClass + " text-slate-100 min-h-screen pb-12";
        }

                 function processGrades() {
            try {
                const input = document.getElementById('rawInput').value;
                if (!input || input.trim() === '') return;

                const lines = input.split('\n');
                allCourses = [];
                let currentSemester = "Unknown";

                lines.forEach(line => {
                    const trimmed = line.trim();
                    if (!trimmed) return;

                    if (trimmed.startsWith("Εξάμηνο:")) {
                        currentSemester = trimmed.replace("Εξάμηνο:", "").trim();
                        return;
                    }

                    // Εδώ ψάχνουμε για τον κωδικό και μετά για έναν αριθμό με κόμμα/τελεία
                    const codeMatch = trimmed.match(/([A-ZΑ-Ω]{2}\d{3}[A-ZΑ-Ω]?\d{0,2})/);
                    const gradeMatch = trimmed.match(/(\d{1,2}[.,]\d{1,2}|\d{1,2})/);

                    if (codeMatch && gradeMatch) {
                        const code = codeMatch[1];
                        const gradeStr = gradeMatch[1];
                        const numericGrade = parseFloat(gradeStr.replace(',', '.'));
                        
                        // Παίρνουμε τον τίτλο αφαιρώντας τον κωδικό και τον βαθμό
                        let title = trimmed.replace(code, '').replace(gradeStr, '').trim();
                        
                        allCourses.push({ 
                            code: code, 
                            title: title, 
                            grade: gradeStr, 
                            numericGrade: numericGrade, 
                            semester: currentSemester, 
                            period: "Εξεταστική" 
                        });
                    }
                });

                if (allCourses.length > 0) {
                    document.getElementById('inputSection').classList.add('hidden');
                    document.getElementById('filterSection').classList.remove('hidden');
                    document.getElementById('gradesContainer').classList.remove('hidden');
                    renderGrades();
                } else {
                    alert('Δεν βρέθηκαν βαθμοί. Έλεγξε αν έβαλες κωδικό μαθήματος και βαθμό.');
                }
            } catch (error) { alert('Σφάλμα: ' + error.message); }
        }

const gradeRegex = /(\d{1,2}[.,]\d{1,2}|\d{1,2})\s+(E[A-Z0-9Α-ΩΞΣ]*)/;

                    const codeRegex = /([A-ZΑ-Ω]{2}\d{3}[A-ZΑ-Ω]?\d{0,2})/;
                    
                    const gradeMatch = trimmed.match(gradeRegex);
                    const codeMatch = trimmed.match(codeRegex);

                    if (gradeMatch && codeMatch) {
                        const gradeStr = gradeMatch[1];
                        const period = gradeMatch[2].trim();
                        const code = codeMatch[1];
                        const numericGrade = parseFloat(gradeStr.replace(',', '.'));
                        let title = trimmed.replace(code, '').replace(gradeMatch[0], '').trim();
                        
                        allCourses.push({ code, title, grade: gradeStr, numericGrade, semester: currentSemester, period });
                    }
                });

                if (allCourses.length > 0) {
                    document.getElementById('inputSection').classList.add('hidden');
                    document.getElementById('filterSection').classList.remove('hidden');
                    document.getElementById('gradesContainer').classList.remove('hidden');
                    renderGrades();
                } else {
                    alert('Δεν βρέθηκαν βαθμοί. Έλεγξε τα δεδομένα σου.');
                }
            } catch (error) { alert('Σφάλμα: ' + error.message); }
        }

        function renderGrades() {
            const container = document.getElementById('dynamicGroups');
            container.innerHTML = '';
            const groups = currentView === 'all' ? { 'Όλα': allCourses } : groupBy(allCourses, currentView === 'semester' ? 'semester' : 'period');
            
            for (const key in groups) {
                const groupWrapper = document.createElement('div');
                groupWrapper.className = "space-y-3";
                groupWrapper.innerHTML = `<h2 class="text-xs font-bold uppercase tracking-widest text-slate-400 mt-6 border-b border-white/10 pb-2">${key}</h2><div class="cards-wrapper space-y-3"></div>`;
                const list = groupWrapper.querySelector('.cards-wrapper');
                groups[key].forEach(c => {
                    const card = document.createElement('div');
                    card.className = `${c.numericGrade >= 5 ? "bg-emerald-500/10 border-emerald-500/20" : "bg-rose-500/10 border-rose-500/20"} border rounded-2xl p-4 flex items-center justify-between shadow-sm`;
                    card.innerHTML = `<div class="flex-1 pr-4"><span class="text-[10px] uppercase font-bold text-slate-500 block">${c.code}</span><h3 class="text-sm font-semibold text-slate-100">${c.title}</h3></div><div class="w-12 h-12 rounded-xl text-lg font-bold flex items-center justify-center ${c.numericGrade >= 5 ? "text-emerald-400 bg-emerald-500/10" : "text-rose-400 bg-rose-500/10"}">${c.grade}</div>`;
                    list.appendChild(card);
                });
                container.appendChild(groupWrapper);
            }
        }

        function groupBy(array, key) { return array.reduce((res, val) => { (res[val[key]] = res[val[key]] || []).push(val); return res; }, {}); }
        function resetApp() { location.reload(); }
        function changeView(view) {
            currentView = view;
            document.querySelectorAll('.view-btn').forEach(btn => btn.classList.replace('bg-indigo-600', 'bg-black/20'));
            document.getElementById('btn-' + view).classList.replace('bg-black/20', 'bg-indigo-600');
            renderGrades();
        }
    </script>
</body>
</html>
