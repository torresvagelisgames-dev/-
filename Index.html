<!DOCTYPE html>
<html lang="el">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MyUniGrades - UniverSIS Style</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; }
    </style>
</head>
<body class="bg-slate-900 text-slate-100 min-h-screen pb-12">

    <!-- Header -->
    <header class="border-b border-slate-800 bg-slate-900/80 backdrop-blur sticky top-0 z-10 px-4 py-4">
        <div class="max-w-md mx-auto flex items-center justify-between">
            <div class="flex items-center gap-3">
                <div class="w-10 h-10 rounded-xl bg-indigo-600 flex items-center justify-center font-bold text-lg text-white shadow-lg shadow-indigo-500/20">
                    U
                </div>
                <div>
                    <h1 class="text-base font-bold tracking-tight">UniverSIS <span class="text-xs font-normal text-slate-400 bg-slate-800 px-2 py-0.5 rounded-full ml-1">Custom</span></h1>
                    <p class="text-xs text-indigo-400 font-medium">Πίνακας Νέων Βαθμών</p>
                </div>
            </div>
        </div>
    </header>

    <main class="max-w-md mx-auto px-4 mt-6 space-y-6">
        
        <!-- Input Section -->
        <div class="bg-slate-800/50 border border-slate-700/60 rounded-2xl p-4 shadow-sm">
            <h2 class="text-sm font-semibold text-slate-300 mb-2 flex items-center gap-2">
                <span>📥</span> Βήμα 1: Επικόλληση Δεδομένων
            </h2>
            <p class="text-xs text-slate-400 mb-3 leading-relaxed">
                Κάνε <b>Ctrl+A και Ctrl+C (ή Επιλογή όλων)</b> από τη σελίδα των βαθμών στο φοιτητολόγιο και κάνε επικόλληση εδώ.
            </p>
            <textarea 
                id="rawInput" 
                rows="4" 
                class="w-full bg-slate-900 border border-slate-700 rounded-xl p-3 text-sm focus:outline-none focus:border-indigo-500 text-slate-200 placeholder-slate-500 transition-colors"
                placeholder="Επικόλληση όλου του κειμένου της σελίδας εδώ..."
            ></textarea>
            <button 
                onclick="processGrades()" 
                class="w-full mt-3 bg-indigo-600 hover:bg-indigo-500 text-white font-medium text-sm py-3 px-4 rounded-xl shadow-md shadow-indigo-600/10 active:scale-[0.98] transition-all"
            >
                Μεταμόρφωση Βαθμών ✨
            </button>
        </div>

        <!-- Filters Section (Εμφανίζεται μόνο μετά την επικόλληση) -->
        <div id="filterSection" class="bg-slate-800/30 border border-slate-800 rounded-2xl p-4 hidden space-y-3">
            <label class="text-xs font-bold uppercase tracking-wider text-slate-400 block">Προβολή και Ταξινόμηση ανά:</label>
            <div class="grid grid-cols-3 gap-2">
                <button onclick="changeView('all')" id="btn-all" class="view-btn bg-indigo-600 text-white text-xs font-semibold py-2.5 px-3 rounded-xl transition-all">Όλα Μαζί</button>
                <button onclick="changeView('semester')" id="btn-semester" class="view-btn bg-slate-800 text-slate-400 text-xs font-semibold py-2.5 px-3 rounded-xl transition-all">Εξάμηνο</button>
                <button onclick="changeView('period')" id="btn-period" class="view-btn bg-slate-800 text-slate-400 text-xs font-semibold py-2.5 px-3 rounded-xl transition-all">Εξεταστική</button>
            </div>
        </div>

        <!-- Output Section -->
        <div id="gradesContainer" class="space-y-4 hidden">
            <!-- Εδώ θα μπαίνουν δυναμικά οι λίστες και οι τίτλοι ομάδων -->
            <div id="dynamicGroups" class="space-y-6"></div>
        </div>

        <!-- Empty State / Guide -->
        <div id="emptyState" class="text-center py-8 px-4 border border-dashed border-slate-800 rounded-2xl">
            <p class="text-sm text-slate-500">Δεν έχουν εισαχθεί βαθμοί ακόμα.</p>
        </div>

    </main>

    <script>
        // Καθολική αποθήκευση των μαθημάτων μετά το parsing
        let allCourses = [];
        let currentView = 'all';

        function processGrades() {
            const input = document.getElementById('rawInput').value;
            
            if (!input.trim()) {
                document.getElementById('gradesContainer').classList.add('hidden');
                document.getElementById('filterSection').classList.add('hidden');
                document.getElementById('emptyState').classList.remove('hidden');
                return;
            }

            const lines = input.split('\n');
            allCourses = [];
            let currentSemester = "Άγνωστο Εξάμηνο";

            lines.forEach(line => {
                const trimmed = line.trim();
                if (!trimmed) return;

                // Ανίχνευση αλλαγής εξαμήνου στον πίνακα (π.χ. "Εξάμηνο: ΧΤ" ή "Εξάμηνο: Η")
                if (trimmed.startsWith("Εξάμηνο:")) {
                    currentSemester = trimmed;
                    return;
                }

                // Regex για βαθμό και εξεταστική (π.χ. 7,6 ΕΣ1 (ΕΑΡ) 2025-2026)
                const gradeMatch = trimmed.match(/(\d[.,]\d|\d{1,2})\s+(ΕΣ\d\s*\([^)]+\)\s*\d{4}-\d{4})/);
                const codeMatch = trimmed.match(/([A-Z]{2}\d{3}[A-Z]\d{2}|[A-Z]{2}\d{5})/);

                if (gradeMatch) {
                    const gradeStr = gradeMatch[1];
                    const period = gradeMatch[2];
                    const code = codeMatch ? codeMatch[1] : 'ΚΩΔΙΚΟΣ';
                    const numericGrade = parseFloat(gradeStr.replace(',', '.'));

                    // Καθαρισμός ονόματος μαθήματος
                    let title = trimmed.replace(code, '').replace(gradeMatch[0], '').trim();
                    title = title.split('\t')[0].split('2025')[0].split('2026')[0].trim();

                    allCourses.push({
                        code: code,
                        title: title,
                        grade: gradeStr,
                        numericGrade: numericGrade,
                        semester: currentSemester,
                        period: period
                    });
                }
            });

            if (allCourses.length > 0) {
                document.getElementById('filterSection').classList.remove('hidden');
                document.getElementById('emptyState').classList.add('hidden');
                document.getElementById('gradesContainer').classList.remove('hidden');
                renderGrades();
            } else {
                alert('Δεν βρέθηκαν βαθμοί. Σιγουρέψου ότι έκανες copy ολόκληρο τον πίνακα από το services.uniwa.gr.');
            }
        }

        function changeView(view) {
            currentView = view;
            
            // Ενημέρωση των κουμπιών
            document.querySelectorAll('.view-btn').forEach(btn => {
                btn.classList.remove('bg-indigo-600', 'text-white');
                btn.classList.add('bg-slate-800', 'text-slate-400');
            });
            const activeBtn = document.getElementById(`btn-${view}`);
            activeBtn.classList.remove('bg-slate-800', 'text-slate-400');
            activeBtn.classList.add('bg-indigo-600', 'text-white');

            renderGrades();
        }

        function renderGrades() {
            const container = document.getElementById('dynamicGroups');
            container.innerHTML = '';

            if (currentView === 'all') {
                // Προβολή Όλα Μαζί
                createGroupMarkup(container, `Όλα τα Μαθήματα (${allCourses.length})`, allCourses);
            } 
            else if (currentView === 'semester') {
                // Ομαδοποίηση ανά Εξάμηνο
                const groups = groupBy(allCourses, 'semester');
                for (const semester in groups) {
                    createGroupMarkup(container, semester, groups[semester]);
                }
            } 
            else if (currentView === 'period') {
                // Ομαδοποίηση ανά Εξεταστική Περίοδο
                const groups = groupBy(allCourses, 'period');
                for (const period in groups) {
                    createGroupMarkup(container, `Εξεταστική: ${period}`, groups[period]);
                }
            }
        }

        function createGroupMarkup(parentContainer, groupTitle, coursesList) {
            const groupWrapper = document.createElement('div');
            groupWrapper.className = "space-y-3";

            groupWrapper.innerHTML = `
                <div class="flex items-center justify-between px-1 mt-4">
                    <h2 class="text-xs font-bold uppercase tracking-wider text-slate-400">${groupTitle}</h2>
                </div>
                <div class="space-y-2.5"></div>
            `;

            const listContainer = groupWrapper.querySelector('.space-y-2\.5');

            coursesList.forEach(course => {
                const card = document.createElement('div');
                
                // Πράσινο (emerald) αν έχει περάσει (>=5), αλλιώς Κόκκινο (rose)
                const isPassed = course.numericGrade >= 5.0;
                
                const cardStyle = isPassed 
                    ? "bg-emerald-950/20 border-emerald-500/30 hover:border-emerald-500/50" 
                    : "bg-rose-950/20 border-rose-500/30 hover:border-rose-500/50";
                    
                const gradeBadgeStyle = isPassed 
                    ? "text-emerald-400 bg-emerald-500/10 border border-emerald-500/20" 
                    : "text-rose-400 bg-rose-500/10 border border-rose-500/20";

                card.className = `${cardStyle} border rounded-2xl p-4 flex items-center justify-between shadow-sm transition-colors`;
                
                card.innerHTML = `
                    <div class="flex-1 pr-4">
                        <span class="text-[10px] uppercase font-bold tracking-wider text-slate-500 block mb-0.5">${course.code}</span>
                        <h3 class="text-sm font-semibold text-slate-100 leading-snug">${course.title}</h3>
                        <span class="text-[10px] text-slate-400 mt-1 inline-block bg-slate-800/60 px-2 py-0.5 rounded-md">${course.period.split(' ')[0]}</span>
                    </div>
                    <div class="flex items-center justify-center w-12 h-12 rounded-xl text-lg font-bold shrink-0 ${gradeBadgeStyle}">
                        ${course.grade}
                    </div>
                `;
                listContainer.appendChild(card);
            });

            parentContainer.appendChild(groupWrapper);
        }

        // Helper function για ομαδοποίηση αντικειμένων
        function groupBy(array, key) {
            return array.reduce((result, currentValue) => {
                (result[currentValue[key]] = result[currentValue[key]] || []).push(currentValue);
                return result;
            }, {});
        }
    </script>
</body>
</html>
